name: devp2p (discv4,discv5,eth,snap)
on:
  workflow_dispatch:
  schedule:
    - cron: "15 06 * * *" # Every day at 06:15 UTC

jobs:
  trigger-generic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // discv4/discv5/eth suites: all clients (generic.yaml default client list)
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'generic.yaml',
              ref: 'master',
              inputs: {
                simulator: '["devp2p"]',
                extra_flags: "--sim.limit='(discv4|discv5|eth)/'",
                concurrency_group: 'devp2p',
                timeout_minutes: '60'
              }
            });
            // snap suite: only clients that support serving snap sync
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'generic.yaml',
              ref: 'master',
              inputs: {
                simulator: '["devp2p"]',
                client: '["besu", "ethrex", "go-ethereum", "nethermind"]',
                extra_flags: '--sim.limit=snap/',
                concurrency_group: 'devp2p-snap',
                timeout_minutes: '60'
              }
            });
